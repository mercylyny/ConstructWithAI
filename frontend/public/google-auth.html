<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Google Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #ffffff;
      color: #202124;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem;
      border: 1px solid #dadce0;
      border-radius: 8px;
      text-align: center;
      box-sizing: border-box;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 400;
      color: #202124;
      margin: 1rem 0 0.25rem 0;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #5f6368;
      margin: 0 0 2rem 0;
    }
    .accounts-list {
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      border: 1px solid #dadce0;
      border-radius: 8px;
      text-align: left;
    }
    .account-item {
      display: flex;
      align-items: center;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #dadce0;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .account-item:last-child {
      border-bottom: none;
    }
    .account-item:hover {
      background-color: #f8f9fa;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9rem;
      margin-right: 12px;
    }
    .details {
      flex: 1;
    }
    .name {
      font-size: 0.875rem;
      font-weight: 500;
      color: #3c4043;
    }
    .email {
      font-size: 0.75rem;
      color: #5f6368;
    }
    .use-another-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0.85rem 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: #1a73e8;
      transition: background-color 0.2s ease;
      border-radius: 4px;
      text-align: left;
    }
    .use-another-btn:hover {
      background-color: #f8f9fa;
    }
    .use-another-btn svg {
      margin-right: 12px;
    }
    .form-container {
      margin: 1rem 0;
      padding: 1rem;
      border: 1px dashed #dadce0;
      border-radius: 8px;
      background: #f8f9fa;
      text-align: left;
    }
    .input-field {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 10px;
      box-sizing: border-box;
      color: #333;
    }
    .input-field:last-of-type {
      margin-bottom: 12px;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-cancel {
      background: #e0e0e0;
      color: #333;
    }
    .btn-submit {
      background: #1a73e8;
      color: #fff;
    }
    .notice {
      font-size: 0.75rem;
      color: #5f6368;
      margin-top: 2rem;
      text-align: left;
      line-height: 1.4;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #70757a;
      margin-top: 1.5rem;
      border-top: 1px solid #dadce0;
      padding-top: 1rem;
    }
    .footer-links span {
      margin-left: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Google Logo SVG -->
    <svg width="74" height="24" viewBox="0 0 74 24" style="margin-bottom: 8px;">
      <path fill="#4285F4" d="M9.24 11.23v2.85h7.27c-.29 1.64-1.9 4.82-7.27 4.82-4.64 0-8.43-3.84-8.43-8.58s3.79-8.58 8.43-8.58c2.64 0 4.41 1.09 5.42 2.06l2.27-2.18C15.42 2.19 12.62 1 9.24 1 4.14 1 0 5.14 0 10.25s4.14 9.25 9.24 9.25c5.32 0 8.86-3.74 8.86-9.02 0-.61-.06-1.07-.15-1.25H9.24z"/>
      <path fill="#EA4335" d="M23.95 7.15c-3.56 0-6.39 2.62-6.39 6.22s2.83 6.22 6.39 6.22c3.56 0 6.39-2.62 6.39-6.22s-2.83-6.22-6.39-6.22zm0 9.7c-1.96 0-3.58-1.57-3.58-3.48s1.62-3.48 3.58-3.48 3.58 1.57 3.58 3.48-1.62 3.48-3.58 3.48z"/>
      <path fill="#FBBC05" d="M38.54 7.15c-3.56 0-6.39 2.62-6.39 6.22s2.83 6.22 6.39 6.22c3.56 0 6.39-2.62 6.39-6.22s-2.83-6.22-6.39-6.22zm0 9.7c-1.96 0-3.58-1.57-3.58-3.48s1.62-3.48 3.58-3.48 3.58 1.57 3.58 3.48-1.62 3.48-3.58 3.48z"/>
      <path fill="#4285F4" d="M51.97 7.15c-3.41 0-6.22 2.68-6.22 6.22s2.78 6.16 6.16 6.16c1.61 0 2.82-.67 3.48-1.39v1.18c0 2.37-1.27 3.64-3.3 3.64-1.67 0-2.7-1.2-3.08-2.22l-2.48 1.03c.73 1.73 2.6 3.93 5.56 3.93 3.23 0 5.96-1.9 5.96-6.42V7.45h-2.79v1.12c-.65-.73-1.83-1.42-3.29-1.42zm-.16 9.7c-1.93 0-3.42-1.57-3.42-3.45s1.49-3.48 3.42-3.48c1.9 0 3.39 1.57 3.39 3.48s-1.49 3.45-3.39 3.45z"/>
      <path fill="#34A853" d="M59.98 1.48h2.82v17.5h-2.82V1.48z"/>
      <path fill="#EA4335" d="M69.66 7.15c-3.1 0-5.46 2.37-5.46 6.09 0 3.84 2.45 6.22 5.86 6.22 2.76 0 4.31-1.67 5-2.7l-2.3-1.52c-.76 1.12-1.79 1.64-2.7 1.64-1.58 0-2.54-.79-3.03-1.91l7.86-3.25-.27-.67c-.52-1.39-2.09-3.9-5.16-3.9zm.12 2.67c1.24 0 2.27.64 2.6 1.48l-5.43 2.24c0-2.21 1.58-3.72 2.83-3.72z"/>
    </svg>

    <h1>Choose an account</h1>
    <div class="subtitle">to continue to BuildAI</div>

    <!-- Accounts List -->
    <div class="accounts-list" id="accounts-list">
      <!-- Generated via JS -->
    </div>

    <!-- Use another account section -->
    <div id="use-another-section">
      <button type="button" class="use-another-btn" id="use-another-btn">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
        <span>Use another account</span>
      </button>
    </div>

    <div id="new-account-form-container" style="display: none;">
      <form id="new-account-form" class="form-container">
        <input type="text" id="new-name" class="input-field" placeholder="Full Name" required />
        <input type="email" id="new-email" class="input-field" placeholder="Email address" required />
        <div class="btn-group">
          <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-submit">Next</button>
        </div>
      </form>
    </div>

    <div class="notice">
      To continue, Google will share your name, email address, language preference, and profile picture with BuildAI.
    </div>

    <div class="footer">
      <span>English (United States)</span>
      <div class="footer-links">
        <span>Help</span>
        <span>Privacy</span>
        <span>Terms</span>
      </div>
    </div>
  </div>

  <script>
    let googleAccounts = [
      { name: 'Mercy Lyny', email: 'mercy.lyny@gmail.com', avatarColor: '#a78bfa', avatarChar: 'M' },
      { name: 'Lead Engineer', email: 'engineer@example.com', avatarColor: '#3b82f6', avatarChar: 'E' },
      { name: 'Guest Estimator', email: 'guest@buildai.com', avatarColor: '#f97316', avatarChar: 'G' }
    ];

    const accountsListDiv = document.getElementById('accounts-list');
    const useAnotherBtn = document.getElementById('use-another-btn');
    const newAccountFormContainer = document.getElementById('new-account-form-container');
    const useAnotherSection = document.getElementById('use-another-section');
    const btnCancel = document.getElementById('btn-cancel');
    const newAccountForm = document.getElementById('new-account-form');

    function selectAccount(account) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'GOOGLE_SIGN_IN_SUCCESS',
          account: {
            name: account.name,
            email: account.email
          }
        }, window.location.origin);
        window.close();
      } else {
        alert('This window was not opened by BuildAI.');
      }
    }

    function renderAccounts() {
      accountsListDiv.innerHTML = '';
      googleAccounts.forEach((acc) => {
        const item = document.createElement('div');
        item.className = 'account-item';
        item.innerHTML = `
          <div class="avatar" style="background-color: ${acc.avatarColor}">${acc.avatarChar}</div>
          <div class="details">
            <div class="name">${acc.name}</div>
            <div class="email">${acc.email}</div>
          </div>
        `;
        item.addEventListener('click', () => selectAccount(acc));
        accountsListDiv.appendChild(item);
      });
    }

    useAnotherBtn.addEventListener('click', () => {
      useAnotherSection.style.display = 'none';
      newAccountFormContainer.style.display = 'block';
    });

    btnCancel.addEventListener('click', () => {
      newAccountFormContainer.style.display = 'none';
      useAnotherSection.style.display = 'block';
    });

    newAccountForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('new-name').value;
      const email = document.getElementById('new-email').value;

      const newAccount = {
        name,
        email,
        avatarColor: '#10b981',
        avatarChar: name.charAt(0).toUpperCase()
      };

      selectAccount(newAccount);
    });

    renderAccounts();
  </script>
</body>
</html>
